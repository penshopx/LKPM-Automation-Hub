openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LKPM-Flow API — companies, reports, data points, constraints, audit trail, and dashboards for LKPM (Laporan Kegiatan Penanaman Modal) reporting to OSS.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: companies
    description: Penanam modal (companies) with NIB and business scale
  - name: reports
    description: LKPM reports per company and reporting period
  - name: dataPoints
    description: Living-document data points with source, status, and confidence
  - name: constraints
    description: Business constraints (kendala) and follow-up narratives
  - name: activities
    description: Audit trail entries for reports
  - name: basisPermits
    description: Perizinan dasar OSS RBA (KKPR, Persetujuan Lingkungan, PBG, SLF, dll.) per Izin
  - name: attachments
    description: Lampiran dokumen bukti (unggah & simpan file) untuk Laporan, Izin, atau perizinan dasar
  - name: dashboard
    description: Aggregated dashboards and compliance views
  - name: anthropic
    description: Asisten AI (penyusun draf laporan dan mentor LKPM dialog Socrates)
  - name: billing
    description: Langganan Stripe dan kredit pendampingan AI
  - name: notifications
    description: Pengingat tenggat LKPM dan preferensi notifikasi
  - name: team
    description: Kolaborasi tim, keanggotaan, dan berbagi akses perusahaan
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies
      parameters:
        - name: scale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BusinessScale"
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /companies/{companyId}/izin:
    get:
      operationId: listIzin
      tags: [izin]
      summary: List izin for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of izin
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Izin"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createIzin
      tags: [izin]
      summary: Create an izin under a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IzinInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Izin"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /izin/{id}:
    get:
      operationId: getIzin
      tags: [izin]
      summary: Get an izin with its reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Izin detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IzinDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateIzin
      tags: [izin]
      summary: Update an izin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IzinUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Izin"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteIzin
      tags: [izin]
      summary: Delete an izin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /izin/{izinId}/basis-permits:
    get:
      operationId: listBasisPermits
      tags: [basisPermits]
      summary: List basis permits (perizinan dasar) for an izin
      parameters:
        - name: izinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of basis permits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BasisPermit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createBasisPermit
      tags: [basisPermits]
      summary: Add a basis permit to an izin
      parameters:
        - name: izinId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BasisPermitInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasisPermit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /basis-permits/{id}:
    patch:
      operationId: updateBasisPermit
      tags: [basisPermits]
      summary: Update a basis permit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BasisPermitUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasisPermit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteBasisPermit
      tags: [basisPermits]
      summary: Delete a basis permit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [attachments]
      summary: Request a presigned URL to upload a file to private object storage
      description: >-
        Validates file type and size, then returns a short-lived presigned PUT
        URL and the normalized object path. The client uploads the file directly
        to the URL; no file bytes pass through this API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid file (type or size)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/{reportId}/attachments:
    get:
      operationId: listReportAttachments
      tags: [attachments]
      summary: List attachments for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createReportAttachment
      tags: [attachments]
      summary: Register an uploaded attachment against a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /izin/{izinId}/attachments:
    get:
      operationId: listIzinAttachments
      tags: [attachments]
      summary: List attachments for an izin
      parameters:
        - name: izinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createIzinAttachment
      tags: [attachments]
      summary: Register an uploaded attachment against an izin
      parameters:
        - name: izinId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /basis-permits/{basisPermitId}/attachments:
    get:
      operationId: listBasisPermitAttachments
      tags: [attachments]
      summary: List attachments for a basis permit
      parameters:
        - name: basisPermitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createBasisPermitAttachment
      tags: [attachments]
      summary: Register an uploaded attachment against a basis permit
      parameters:
        - name: basisPermitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /attachments/{id}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment and its stored file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List reports
      parameters:
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
        - name: izinId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReportStatus"
        - name: scale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BusinessScale"
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: createReport
      tags: [reports]
      summary: Create a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a report with full detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateReport
      tags: [reports]
      summary: Update a report (status, narrative, gates)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/{reportId}/data-points:
    get:
      operationId: listDataPoints
      tags: [dataPoints]
      summary: List data points for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataPoint"
    post:
      operationId: createDataPoint
      tags: [dataPoints]
      summary: Add a data point to a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPointInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataPoint"
  /data-points/{id}:
    patch:
      operationId: updateDataPoint
      tags: [dataPoints]
      summary: Update a data point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataPointUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataPoint"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteDataPoint
      tags: [dataPoints]
      summary: Delete a data point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/{reportId}/constraints:
    get:
      operationId: listConstraints
      tags: [constraints]
      summary: List constraints for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Constraints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Constraint"
    post:
      operationId: createConstraint
      tags: [constraints]
      summary: Add a constraint to a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConstraintInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Constraint"
  /constraints/{id}:
    patch:
      operationId: updateConstraint
      tags: [constraints]
      summary: Update a constraint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConstraintUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Constraint"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteConstraint
      tags: [constraints]
      summary: Delete a constraint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/{reportId}/activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List audit trail entries for a report
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Add an audit trail entry
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Compliance and pipeline summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /dashboard/calendar:
    get:
      operationId: getReportingCalendar
      tags: [dashboard]
      summary: Upcoming reporting deadlines
      responses:
        "200":
          description: Calendar entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEntry"
  /dashboard/data-quality:
    get:
      operationId: getDataQuality
      tags: [dashboard]
      summary: Anti-hallucination data quality control view
      responses:
        "200":
          description: Data quality control
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataQuality"
  /assistant/report-draft:
    post:
      operationId: generateReportDraft
      tags: [anthropic]
      summary: Susun draf narasi LKPM dari data laporan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportDraftInput"
      responses:
        "200":
          description: Draf narasi laporan yang dihasilkan AI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDraft"
        "404":
          description: Laporan tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /assistant/orchestrate:
    post:
      operationId: orchestrateReportDraft
      tags: [anthropic]
      summary: Susun draf LKPM secara agentik (orkestrator + 5 agen, SSE stream)
      description: >-
        Menjalankan pipeline agentik (Pengumpul Data, Validator Anti-Halusinasi,
        Pemeriksa Kepatuhan OSS, Penyusun Narasi, Pemantau Tenggat & Risiko) dan
        mengalirkan kemajuan tiap agen sebagai SSE. Event berupa JSON pada baris
        `data:` dengan bentuk agent_start, agent_done, final, error, dan done.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchestrateReportDraftInput"
      responses:
        "200":
          description: Aliran SSE kemajuan tiap agen dan hasil akhir
          content:
            text/event-stream: {}
        "404":
          description: Laporan tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: Daftar percakapan mentor
      responses:
        "200":
          description: Daftar percakapan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Buat percakapan mentor baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Percakapan dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Ambil percakapan beserta pesan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Percakapan beserta pesan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Hapus percakapan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Terhapus
        "404":
          description: Tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /anthropic/conversations/{id}/messages:
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Kirim pesan ke mentor dan terima jawaban (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: Aliran SSE potongan jawaban asisten
          content:
            text/event-stream: {}
  /assistant/helpdesk:
    post:
      operationId: helpdeskChat
      tags: [anthropic]
      summary: Tanya jawab helpdesk LKPM-Flow (LKPM, OSS, NIB, KBLI) via SSE
      description: >-
        Asisten helpdesk tanpa status yang menjawab pertanyaan seputar cara
        memakai aplikasi LKPM-Flow serta pengetahuan LKPM, OSS, NIB, dan KBLI.
        Riwayat percakapan dikirim dari klien; jawaban dialirkan sebagai SSE
        pada baris `data:` berupa JSON {content} per potongan dan {done:true} di
        akhir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HelpdeskInput"
      responses:
        "200":
          description: Aliran SSE potongan jawaban helpdesk
          content:
            text/event-stream: {}
  /me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Profil pengguna saat ini (peran akun)
      description: >-
        Mengembalikan peran akun pengguna yang sedang masuk. `role` bernilai
        null bila pengguna belum memilih peran (perlu onboarding).
      responses:
        "200":
          description: Profil pengguna
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
  /me/role:
    post:
      operationId: setCurrentUserRole
      tags: [users]
      summary: Tetapkan peran akun (sekali saat onboarding)
      description: >-
        Menetapkan peran akun pengguna. Hanya bisa ditetapkan bila peran belum
        ada; bila sudah ada, peran yang tersimpan tetap dikembalikan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleInput"
      responses:
        "200":
          description: Profil pengguna setelah peran ditetapkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Daftar notifikasi pengguna saat ini
      description: >-
        Mengembalikan notifikasi milik pengguna yang sedang masuk (terbaru
        dahulu) beserta jumlah yang belum dibaca. Pemanggilan ini juga memicu
        pembuatan pengingat tenggat terbaru untuk pengguna secara idempoten.
      responses:
        "200":
          description: Daftar notifikasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Tandai notifikasi sebagai dibaca
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notifikasi yang diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Tandai semua notifikasi sebagai dibaca
      responses:
        "200":
          description: Jumlah notifikasi yang ditandai dibaca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkAllReadResult"
  /notification-preferences:
    get:
      operationId: getNotificationPreferences
      tags: [notifications]
      summary: Preferensi notifikasi pengguna saat ini
      responses:
        "200":
          description: Preferensi notifikasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
    patch:
      operationId: updateNotificationPreferences
      tags: [notifications]
      summary: Perbarui preferensi notifikasi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferencesUpdate"
      responses:
        "200":
          description: Preferensi notifikasi setelah diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

  /billing/summary:
    get:
      operationId: getBillingSummary
      tags: [billing]
      summary: Ringkasan langganan dan kredit pendampingan AI
      description: >-
        Mengembalikan paket aktif, batas perusahaan, dan saldo kredit
        pendampingan AI (jatah bulanan + saldo beli) milik konsultan saat ini.
      responses:
        "200":
          description: Ringkasan penagihan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSummary"
  /billing/plans:
    get:
      operationId: listBillingPlans
      tags: [billing]
      summary: Daftar paket langganan dan paket kredit yang tersedia
      responses:
        "200":
          description: Daftar paket
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingPlan"
  /billing/checkout:
    post:
      operationId: createBillingCheckout
      tags: [billing]
      summary: Mulai sesi checkout Stripe (langganan atau beli kredit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutInput"
      responses:
        "200":
          description: URL checkout Stripe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCheckoutResult"
        "409":
          description: Peran akun belum ditetapkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Layanan Stripe belum terhubung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing/portal:
    post:
      operationId: createBillingPortal
      tags: [billing]
      summary: Buka portal pelanggan Stripe untuk kelola langganan
      responses:
        "200":
          description: URL portal pelanggan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPortalResult"
        "404":
          description: Belum ada pelanggan Stripe untuk konsultan ini
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Layanan Stripe belum terhubung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing/credits/claim:
    post:
      operationId: claimBillingCredits
      tags: [billing]
      summary: Klaim kredit dari sesi checkout yang sudah dibayar
      description: >-
        Memvalidasi sesi checkout ke Stripe lalu menambahkan kredit ke saldo
        beli konsultan. Idempoten — sesi yang sama tidak akan dihitung dua kali.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimCreditsInput"
      responses:
        "200":
          description: Hasil klaim kredit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimCreditsResult"
        "502":
          description: Layanan Stripe belum terhubung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List team members invited by the current owner
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: inviteTeamMember
      tags: [team]
      summary: Invite a team member (creates a pending invite)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
  /team/members/{id}:
    delete:
      operationId: removeTeamMember
      tags: [team]
      summary: Revoke a team member and their shares
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /team/accept:
    post:
      operationId: acceptInvite
      tags: [team]
      summary: Accept a team invite using an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteInput"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInviteResult"
        "404":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /companies/{companyId}/collaborators:
    get:
      operationId: listCompanyCollaborators
      tags: [team]
      summary: List collaborators with access to a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Collaborators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyCollaborator"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /companies/{companyId}/shares:
    post:
      operationId: shareCompany
      tags: [team]
      summary: Share a company with an active team member
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareCompanyInput"
      responses:
        "201":
          description: Shared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyCollaborator"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /companies/{companyId}/shares/{memberId}:
    delete:
      operationId: unshareCompany
      tags: [team]
      summary: Remove a member's access to a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Unshared
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /reports/{id}/approval:
    post:
      operationId: transitionApproval
      tags: [reports]
      summary: Advance the maker-checker-approver approval flow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionInput"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "403":
          description: Not authorized for this approval step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid transition for current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    BillingSummary:
      type: object
      properties:
        role:
          type: string
          nullable: true
          enum: [konsultan, perusahaan, null]
        plan:
          type: object
          properties:
            tier:
              type: string
            name:
              type: string
            status:
              type: string
              enum: [active, none]
          required: [tier, name, status]
        credits:
          type: object
          properties:
            allowanceTotal:
              type: integer
            allowanceRemaining:
              type: integer
            topupBalance:
              type: integer
            available:
              type: integer
          required: [allowanceTotal, allowanceRemaining, topupBalance, available]
        limits:
          type: object
          properties:
            maxCompanies:
              type: integer
              nullable: true
              description: Batas jumlah perusahaan; null berarti tanpa batas
            companyCount:
              type: integer
          required: [maxCompanies, companyCount]
      required: [role, plan, credits, limits]
    BillingPlanPrice:
      type: object
      properties:
        priceId:
          type: string
        unitAmount:
          type: integer
          nullable: true
        currency:
          type: string
        interval:
          type: string
          nullable: true
          enum: [month, year, null]
      required: [priceId, unitAmount, currency, interval]
    BillingPlan:
      type: object
      properties:
        productId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        kind:
          type: string
          enum: [subscription, credit]
        tier:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        maxCompanies:
          type: integer
          nullable: true
        monthlyCredits:
          type: integer
          nullable: true
        credits:
          type: integer
          nullable: true
        prices:
          type: array
          items:
            $ref: "#/components/schemas/BillingPlanPrice"
      required:
        - productId
        - name
        - description
        - kind
        - tier
        - role
        - maxCompanies
        - monthlyCredits
        - credits
        - prices
    BillingCheckoutInput:
      type: object
      properties:
        priceId:
          type: string
      required: [priceId]
    BillingCheckoutResult:
      type: object
      properties:
        url:
          type: string
          nullable: true
      required: [url]
    BillingPortalResult:
      type: object
      properties:
        url:
          type: string
      required: [url]
    ClaimCreditsInput:
      type: object
      properties:
        sessionId:
          type: string
      required: [sessionId]
    ClaimCreditsResult:
      type: object
      properties:
        granted:
          type: integer
        available:
          type: integer
      required: [granted, available]
    CurrentUser:
      type: object
      properties:
        role:
          type: string
          nullable: true
          enum: [konsultan, perusahaan, null]
          description: Peran akun; null bila belum onboarding
      required:
        - role
    SetRoleInput:
      type: object
      properties:
        role:
          type: string
          enum: [konsultan, perusahaan]
      required:
        - role
    Notification:
      type: object
      properties:
        id:
          type: integer
        reportId:
          type: integer
          nullable: true
        type:
          type: string
          enum: [deadline_upcoming, deadline_overdue]
          description: Jenis notifikasi
        title:
          type: string
        body:
          type: string
        deadline:
          type: string
          nullable: true
          description: Tanggal tenggat terkait (YYYY-MM-DD), bila ada
        read:
          type: boolean
          description: Apakah notifikasi sudah dibaca
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - reportId
        - type
        - title
        - body
        - deadline
        - read
        - createdAt
    NotificationList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer
      required:
        - items
        - unreadCount
    MarkAllReadResult:
      type: object
      properties:
        updated:
          type: integer
          description: Jumlah notifikasi yang ditandai dibaca
      required:
        - updated
    NotificationPreferences:
      type: object
      properties:
        enabled:
          type: boolean
          description: Sakelar utama pengingat tenggat
        inAppEnabled:
          type: boolean
          description: Kirim notifikasi di dalam aplikasi
        emailEnabled:
          type: boolean
          description: Kirim pengingat via email (bila email tersedia)
        email:
          type: string
          nullable: true
          description: >-
            Alamat email konsultan tujuan pengingat, disinkronkan dari profil
            akun. Null bila belum tersinkron; pengiriman email dilewati bila null.
        reminderLeadDays:
          type: array
          items:
            type: integer
          description: Ambang tenggang hari pengingat, mis. [7, 3, 1]
      required:
        - enabled
        - inAppEnabled
        - emailEnabled
        - email
        - reminderLeadDays
    NotificationPreferencesUpdate:
      type: object
      properties:
        enabled:
          type: boolean
        inAppEnabled:
          type: boolean
        emailEnabled:
          type: boolean
        email:
          type: string
          nullable: true
          description: Alamat email konsultan tujuan pengingat (disinkronkan dari profil)
        reminderLeadDays:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 365
    TeamMember:
      type: object
      description: >-
        Anggota tim yang diundang oleh pemilik (owner). inviteCode hanya
        dikembalikan kepada pemilik untuk dibagikan ke calon anggota.
      required:
        - id
        - email
        - status
        - createdAt
      properties:
        id:
          type: integer
        email:
          type: string
        status:
          type: string
          enum: [pending, active, revoked]
        memberId:
          type: ["string", "null"]
          description: Clerk userId anggota; terisi setelah undangan diterima
        inviteCode:
          type: ["string", "null"]
          description: Kode undangan untuk diserahkan ke calon anggota
        createdAt:
          type: string
          format: date-time
    TeamMemberInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          minLength: 1
          description: Email/label calon anggota (untuk tampilan)
    AcceptInviteInput:
      type: object
      required:
        - inviteCode
      properties:
        inviteCode:
          type: string
          minLength: 1
    AcceptInviteResult:
      type: object
      required:
        - ownerId
        - status
      properties:
        ownerId:
          type: string
        status:
          type: string
          enum: [pending, active, revoked]
    CompanyCollaborator:
      type: object
      description: Pihak yang dapat mengakses sebuah perusahaan (pemilik atau anggota berbagi).
      required:
        - userId
        - name
        - isOwner
      properties:
        userId:
          type: string
        name:
          type: string
          description: Email anggota atau label pemilik
        isOwner:
          type: boolean
        shareId:
          type: ["integer", "null"]
          description: Id baris berbagi (null untuk pemilik)
    ShareCompanyInput:
      type: object
      required:
        - memberId
      properties:
        memberId:
          type: string
          minLength: 1
          description: Clerk userId anggota tim aktif yang diberi akses
    ApprovalStatus:
      type: string
      enum: [draft, submitted, reviewed, approved]
      description: Status alur persetujuan maker-checker-approver
    ApprovalActionInput:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [submit, review, approve, reject]
          description: >-
            submit = maker mengajukan; review = checker menyetujui tinjauan;
            approve = approver menyetujui akhir; reject = kembalikan ke draft
        note:
          type: string
          description: Catatan opsional untuk jejak audit
    ReportDraftInput:
      type: object
      properties:
        reportId:
          type: integer
        focus:
          type: string
          description: Penekanan opsional dari pengguna (mis. fokus realisasi investasi)
      required:
        - reportId
    ReportDraft:
      type: object
      properties:
        activityNarrative:
          type: string
          description: Draf narasi kegiatan penanaman modal untuk periode
        constraintNarrative:
          type: string
          description: Draf narasi kendala dan rencana tindak lanjut
        dataNotes:
          type: string
          description: Catatan kualitas data (sumber, verifikasi, confidence) yang perlu diperhatikan
        disclaimer:
          type: string
      required:
        - activityNarrative
        - constraintNarrative
        - dataNotes
        - disclaimer
    OrchestrateReportDraftInput:
      type: object
      properties:
        reportId:
          type: integer
        focus:
          type: string
          description: Penekanan opsional dari pengguna (mis. fokus realisasi investasi)
      required:
        - reportId
    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    AnthropicConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    AnthropicMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    HelpdeskInput:
      type: object
      properties:
        messages:
          type: array
          description: Riwayat percakapan helpdesk dari klien (urut terlama ke terbaru)
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
            required:
              - role
              - content
      required:
        - messages
    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
