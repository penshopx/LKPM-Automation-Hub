    DataStatus:
      type: string
      enum: [terverifikasi, perlu_verifikasi, estimasi]
      description: Verification status of a data point

    RiskLevel:
      type: string
      enum: [rendah, menengah_rendah, menengah_tinggi, tinggi]
      description: Tingkat risiko usaha OSS RBA — rendah, menengah-rendah, menengah-tinggi, tinggi

    BasisPermitType:
      type: string
      enum: [kkpr, persetujuan_lingkungan, pbg, slf, sertifikat_standar, izin]
